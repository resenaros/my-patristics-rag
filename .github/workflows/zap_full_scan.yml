name: OWASP ZAP Full Scan

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  zap_full:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run ZAP full scan
        uses: zaproxy/actions-full-scan@v0.7.0
        with:
          target: 'http://localhost:7860'
        continue-on-error: true
