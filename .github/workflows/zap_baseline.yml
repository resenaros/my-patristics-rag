name: OWASP ZAP Baseline Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  zap_baseline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Prepare zap-work directory
        run: mkdir -p zap-work && chmod 777 zap-work

      - name: Run ZAP baseline scan (custom docker)
        run: |
          docker run --user $(id -u):$(id -g) \
            -v ${{ github.workspace }}/zap-work:/zap/wrk \
            zaproxy/zap-stable \
            zap-baseline.py \
              -t https://huggingface.co/spaces/ara967/patristics-rag-agent-demo \
              -r zap_hfspace_baseline.html

      - name: Upload ZAP report
        uses: actions/upload-artifact@v4
        with:
          name: zap-baseline-report
          path: |
            zap-work/zap_hfspace_baseline.html