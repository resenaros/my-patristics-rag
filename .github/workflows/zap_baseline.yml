name: OWASP ZAP Baseline Scan

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  zap_baseline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run ZAP baseline scan
        uses: zaproxy/actions-baseline@v0.7.0
        with:
          target: 'http://localhost:7860'
        continue-on-error: true
